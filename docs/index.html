<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnvML — Try First-Class Environments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-editor: #282c34;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --text-editor: #abb2bf;
            --accent: #c96432;
            --accent-hover: #b55a2b;
            --border: #e2e8f0;
            --border-dark: #3e4451;
            --success: #48bb78;
            --error: #f56565;
            /* Syntax highlighting colors (One Dark theme) */
            --syn-keyword: #c678dd;
            --syn-type: #e5c07b;
            --syn-string: #98c379;
            --syn-number: #d19a66;
            --syn-comment: #5c6370;
            --syn-operator: #56b6c2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            line-height: 1.5;
        }

        /* Header */
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.02em;
        }

        .logo span {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .header-links {
            display: flex;
            gap: 24px;
        }

        .header-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.15s;
        }

        .header-links a:hover {
            color: var(--text-primary);
        }

        /* Main Layout */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        /* Editor Panel */
        .editor-panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .panel-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .toolbar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--bg-primary);
            border-color: var(--text-secondary);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        /* Example dropdown */
        .example-select {
            font-family: inherit;
            font-size: 0.8125rem;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
        }

        .example-select:hover {
            border-color: var(--text-secondary);
        }

        .example-select:focus {
            border-color: var(--accent);
        }

        /* Editor with syntax highlighting */
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        .editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-editor);
            color: var(--text-editor);
            padding: 16px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-y: auto;
            pointer-events: none;
            tab-size: 4;
        }

        #editor {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            color: transparent;
            caret-color: #fff;
            border: none;
            padding: 16px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            resize: none;
            outline: none;
            tab-size: 4;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #editor::placeholder {
            color: var(--syn-comment);
        }

        /* Syntax highlighting classes */
        .syn-keyword { color: var(--syn-keyword); }
        .syn-type { color: var(--syn-type); }
        .syn-string { color: var(--syn-string); }
        .syn-number { color: var(--syn-number); }
        .syn-comment { color: var(--syn-comment); font-style: italic; }
        .syn-operator { color: var(--syn-operator); }

        /* Stage Buttons */
        .stage-bar {
            display: flex;
            padding: 12px 16px;
            gap: 6px;
            background: #21252b;
            border-top: 1px solid var(--border-dark);
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .stage-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 3px;
            border: none;
            background: #3e4451;
            color: #abb2bf;
            cursor: pointer;
            transition: all 0.15s;
        }

        .stage-btn:hover {
            background: #4b5263;
            color: #e5e5e5;
        }

        .stage-btn.active {
            background: var(--accent);
            color: white;
        }

        .stage-divider {
            width: 1px;
            background: var(--border-dark);
            margin: 0 6px;
        }

        /* Output Panel */
        .output-panel {
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            overflow: hidden;
        }

        .output-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .output-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12.5px;
            line-height: 1.7;
            background: var(--bg-primary);
            min-height: 0;
        }

        .output-content::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .output-content::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .output-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .output-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Output Entries */
        .output-entry {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .output-entry:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .output-label {
            display: inline-block;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 8px;
        }

        .output-label.stage {
            background: #edf2f7;
            color: #4a5568;
        }

        .output-label.error {
            background: #fed7d7;
            color: #c53030;
        }

        .output-label.success {
            background: #c6f6d5;
            color: #276749;
        }

        .output-text {
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary);
        }

        .output-text.error {
            color: var(--error);
        }

        .output-text.dimmed {
            color: var(--text-secondary);
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
        }

        .status-dot.ready {
            background: var(--success);
        }

        .status-dot.loading {
            background: var(--accent);
            animation: pulse 1s infinite;
        }

        .status-dot.error {
            background: var(--error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.875rem;
            max-width: 280px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>EnvML</h1>
            <span>First-Class Environments</span>
        </div>
    </header>

    <main>
        <section class="editor-panel">
            <div class="panel-toolbar">
                <span class="panel-title">Source</span>
                <div class="toolbar-actions">
                    <select class="example-select" id="exampleSelect" onchange="loadExample(this.value)">
                        <option value="">Load Example...</option>
                        <option value="1">Policy Functors</option>
                        <option value="2">Record Projection</option>
                        <option value="3">Polymorphic Records</option>
                    </select>
                    <button class="btn" onclick="clearEditor()">Clear</button>
                </div>
            </div>
            <div class="editor-wrapper">
                <div class="editor-container">
                    <div id="highlight-layer" aria-hidden="true"></div>
                    <textarea id="editor" spellcheck="false" placeholder="(* Enter EnvML code here *)">module type POLICY = 
  forall t. sig val trans : t -> [t];; end;;

module type FOO = 
  sig
    type a = int;;
    val trans_int : a;;
  end;;

module policy1 : POLICY = 
  functor (type t)
    let trans : t -> [t] = (fun (x) -> [x]);;
  end;;

module policy2 : POLICY =
  functor (type t)
    let trans : t -> [t] = fun (x) -> [];;
  end;;

module foo : POLICY ->m FOO =
  functor (m : POLICY) ->
    struct
      type a = int;;
      let trans_int : a -> [a] = (m @ int).trans;;
    end;;

let ls1 : int = box [impl = foo(policy1).trans_int] in impl(42);;
let ls2 : int = box [impl = foo(policy2).trans_int] in impl(42);;</textarea>
                </div>
            </div>
            <div class="stage-bar">
                <button class="stage-btn" onclick="runStage('Parse')">Parse</button>
                <button class="stage-btn" onclick="runStage('Desugar')">Desugar</button>
                <button class="stage-btn" onclick="runStage('DeBruijn')">De Bruijn</button>
                <div class="stage-divider"></div>
                <button class="stage-btn" onclick="runStage('Elaborate')">Elaborate</button>
                <div class="stage-divider"></div>
                <button class="stage-btn" onclick="runStage('Check')">Type Check</button>
                <button class="stage-btn active" onclick="runStage('Eval')">Eval</button>
            </div>
        </section>

        <section class="output-panel">
            <div class="output-toolbar">
                <span class="panel-title">Output</span>
                <button class="btn" onclick="clearOutput()">Clear</button>
            </div>
            <div class="output-content" id="output">
                <div class="empty-state">
                    <div class="empty-state-icon">λ</div>
                    <p>Run a compilation stage to see the output here.</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="status-dot loading" id="statusDot"></span>
                    <span id="statusText">Loading WASM module...</span>
                </div>
                <span>EnvML v0.1</span>
            </div>
        </section>
    </main>

    <script type="module">
    import { WASI } from "https://cdn.jsdelivr.net/npm/@runno/wasi@0.7.0/dist/wasi.js";
    import ghc_wasm_jsffi from "./ghc_wasm_jsffi.js";

    // Examples
    const examples = {
        "1": `module type POLICY = 
  forall t. sig val trans : t -> [t];; end;;

module type FOO = 
  sig
    type a = int;;
    val trans_int : a;;
  end;;

module policy1 : POLICY = 
  functor (type t)
    let trans : t -> [t] = (fun (x) -> [x]);;
  end;;

module policy2 : POLICY =
  functor (type t)
    let trans : t -> [t] = fun (x) -> [];;
  end;;

module foo : POLICY ->m FOO =
  functor (m : POLICY) ->
    struct
      type a = int;;
      let trans_int : a -> [a] = (m @ int).trans;;
    end;;

let ls1 : int = box [impl = foo(policy1).trans_int] in impl(42);;
let ls2 : int = box [impl = foo(policy2).trans_int] in impl(42);;`,

        "2": `
let y : int = ({f = 1, g = 1}).f;;`,

        "3": `
let f : {l : int, k : int} -> int = 
  ((fun (type t) (x) -> x.l) :: forall a. {l : a, k : a} -> a) @int;;`
    };

    // Syntax highlighting
    const keywords = [
        'module', 'type', 'sig', 'end', 'struct', 'functor', 'forall',
        'let', 'in', 'fun', 'if', 'then', 'else', 'fix', 'box',
        'val', 'import', 'open', 'include', 'with', 'and', 'rec'
    ];
    
    const types = ['int', 'bool', 'string', 'unit'];

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function highlightSyntax(code) {
        let result = escapeHtml(code);
        
        // Comments (* ... *)
        result = result.replace(/\(\*[\s\S]*?\*\)/g, '<span class="syn-comment">$&</span>');
        
        // Strings
        result = result.replace(/"([^"\\]|\\.)*"/g, '<span class="syn-string">$&</span>');
        
        // Numbers
        result = result.replace(/\b(\d+)\b/g, '<span class="syn-number">$1</span>');
        
        // Keywords (word boundary)
        const keywordPattern = new RegExp(`\\b(${keywords.join('|')})\\b`, 'g');
        result = result.replace(keywordPattern, '<span class="syn-keyword">$1</span>');
        
        // Types
        const typePattern = new RegExp(`\\b(${types.join('|')})\\b`, 'g');
        result = result.replace(typePattern, '<span class="syn-type">$1</span>');
        
        // Operators
        result = result.replace(/-&gt;m/g, '<span class="syn-operator">-&gt;m</span>');
        result = result.replace(/-&gt;/g, '<span class="syn-operator">-&gt;</span>');
        result = result.replace(/::/g, '<span class="syn-operator">::</span>');
        result = result.replace(/\|&gt;/g, '<span class="syn-operator">|&gt;</span>');
        result = result.replace(/=&gt;/g, '<span class="syn-operator">=&gt;</span>');
        
        return result;
    }

    function updateHighlight() {
        const editor = document.getElementById('editor');
        const highlightLayer = document.getElementById('highlight-layer');
        highlightLayer.innerHTML = highlightSyntax(editor.value) + '\n';
    }

    function syncScroll() {
        const editor = document.getElementById('editor');
        const highlightLayer = document.getElementById('highlight-layer');
        highlightLayer.scrollTop = editor.scrollTop;
        highlightLayer.scrollLeft = editor.scrollLeft;
    }

    // Initialize editor events
    const editor = document.getElementById('editor');
    editor.addEventListener('input', updateHighlight);
    editor.addEventListener('scroll', syncScroll);
    
    // Initial highlight
    updateHighlight();

    let wasmInstance = null;

    async function initWasm() {
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        try {
            const wasi = new WASI({
                stdout: (out) => console.log("[wasm stdout]", out),
                stderr: (err) => console.error("[wasm stderr]", err)
            });

            const jsffiExports = {};
            
            const importObject = Object.assign(
                { ghc_wasm_jsffi: ghc_wasm_jsffi(jsffiExports) },
                wasi.getImportObject()
            );

            const wasm = await WebAssembly.instantiateStreaming(
                fetch('./WASM.wasm'),
                importObject
            );
            
            Object.assign(jsffiExports, wasm.instance.exports);

            wasi.initialize(wasm, {
                ghc_wasm_jsffi: ghc_wasm_jsffi(jsffiExports)
            });

            wasm.instance.exports.setup();
            
            wasmInstance = wasm.instance;
            
            statusDot.className = 'status-dot ready';
            statusText.textContent = 'Ready';
            
        } catch (error) {
            console.error('WASM initialization failed:', error);
            statusDot.className = 'status-dot error';
            statusText.textContent = 'Failed to load WASM';
            addOutput('Initialization Error', error.message, 'error');
        }
    }

    async function runStage(stage) {
        if (!wasmInstance) {
            addOutput('Error', 'WASM module not loaded yet', 'error');
            return;
        }

        const input = document.getElementById('editor').value;
        const funcName = 'run' + stage;
        
        // Update active button
        document.querySelectorAll('.stage-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');
        
        try {
            const result = await wasmInstance.exports[funcName](input);
            addOutput(stage, result, 'stage');
        } catch (error) {
            addOutput(stage + ' Error', error.message, 'error');
            console.error(error);
        }
    }

    function addOutput(label, text, type) {
        const output = document.getElementById('output');
        
        // Clear empty state if present
        const emptyState = output.querySelector('.empty-state');
        if (emptyState) {
            emptyState.remove();
        }

        const entry = document.createElement('div');
        entry.className = 'output-entry';
        
        const labelEl = document.createElement('div');
        labelEl.className = `output-label ${type}`;
        labelEl.textContent = label;
        
        const textEl = document.createElement('pre');
        textEl.className = `output-text ${type === 'error' ? 'error' : ''}`;
        textEl.textContent = text;
        
        entry.appendChild(labelEl);
        entry.appendChild(textEl);
        output.insertBefore(entry, output.firstChild);
    }

    function clearOutput() {
        const output = document.getElementById('output');
        output.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">λ</div>
                <p>Run a compilation stage to see the output here.</p>
            </div>
        `;
    }

    function clearEditor() {
        const editor = document.getElementById('editor');
        editor.value = '';
        updateHighlight();
        document.getElementById('exampleSelect').value = '';
    }

    function loadExample(id) {
        if (id && examples[id]) {
            const editor = document.getElementById('editor');
            editor.value = examples[id];
            updateHighlight();
        }
    }

    // Expose functions globally
    window.runStage = runStage;
    window.clearOutput = clearOutput;
    window.clearEditor = clearEditor;
    window.loadExample = loadExample;

    // Initialize
    initWasm();
    </script>
</body>
</html>
